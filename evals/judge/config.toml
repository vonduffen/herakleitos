# Judge/model backends. Frontier backends: OFFLINE GRADING ONLY (MODELS.md).
# Decisions (2026-07-22): frontier judges = Anthropic + OpenAI; open-weights
# teacher/judge = hosted API (Together AI). Licenses verified in MODELS.md.
# Export the api_key_env vars before running calibrate.py / report.py.

[backends.frontier1]
kind = "anthropic"
model = "claude-opus-4-8"
api_key_env = "ANTHROPIC_API_KEY"

[backends.frontier2]
kind = "openai"
base_url = "https://api.openai.com/v1"
model = "gpt-5.2"                 # confirm the current GPT id against the account before first run
api_key_env = "OPENAI_API_KEY"

[backends.openweights_judge]
# Datagen filter gate + runtime-grader distillation teacher. DIFFERENT FAMILY
# from the teacher below (Qwen vs DeepSeek) - separation of powers.
# Apache-2.0 verified 2026-07-22 (see MODELS.md).
kind = "openai"
base_url = "https://api.together.xyz/v1"
model = "Qwen/Qwen3.5-9B"
api_key_env = "TOGETHER_API_KEY"
extra_body = { chat_template_kwargs = { enable_thinking = false } }

[backends.teacher]
# Datagen generation. DeepSeek-V4-Pro, MIT verified 2026-07-23 (see MODELS.md).
# (V3.1 was delisted from Together serverless -- dedicated-endpoint only now.)
kind = "openai"
base_url = "https://api.together.xyz/v1"
model = "deepseek-ai/DeepSeek-V4-Pro"
api_key_env = "TOGETHER_API_KEY"

[backends.mock]
kind = "mock"

# ---- Free local PoC backends (ollama, OpenAI-compatible, localhost) ----
# Teacher and judge are DIFFERENT families (Qwen vs Microsoft Phi).
# Licenses verified 2026-07-22 (Apache-2.0 / MIT, see MODELS.md).
# export OLLAMA_API_KEY=local before use
# (ollama ignores auth; the harness just requires a non-empty key).

[backends.teacher_local]
kind = "openai"
base_url = "http://localhost:11434/v1"
model = "qwen3:8b"
api_key_env = "OLLAMA_API_KEY"

[backends.judge_local]
kind = "openai"
base_url = "http://localhost:11434/v1"
model = "phi4:14b"
api_key_env = "OLLAMA_API_KEY"

[backends.student_local]
# mlx_lm server (OpenAI-compatible) on :8080 - serves base or tuned student
# depending on how the server was launched (--adapter-path or not).
kind = "openai"
base_url = "http://localhost:8080/v1"
model = "mlx-community/Qwen3-1.7B-4bit"
api_key_env = "OLLAMA_API_KEY"
