# DIFFERENT FAMILY from the teacher below (separation of powers).
kind = "openai"
base_url = ""                    # decision pending (API provider or self-hosted)
model = "qwen3-235b-a22b"        # decision pending; verify Apache-2.0 on the exact checkpoint
api_key_env = "OPENWEIGHTS_JUDGE_API_KEY"

[backends.teacher]
kind = "openai"
base_url = ""                    # decision pending
model = "deepseek-v4"            # decision pending; verify MIT on the exact checkpoint
api_key_env = "TEACHER_API_KEY"

[backends.mock]
