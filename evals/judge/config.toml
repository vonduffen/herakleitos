# Judge/model backends. Frontier backends: OFFLINE GRADING ONLY (MODELS.md).
# Model choices marked "decision pending" await the human call recorded in the
# build plan's open decisions; update here, nowhere else.

[backends.frontier1]
kind = "anthropic"
model = "claude-opus-4-8"        # decision pending
api_key_env = "ANTHROPIC_API_KEY"

[backends.frontier2]
kind = "openai"
base_url = "https://api.openai.com/v1"
model = "gpt-5.2"                # decision pending (must be a non-Anthropic provider)
api_key_env = "OPENAI_API_KEY"

[backends.openweights_judge]
